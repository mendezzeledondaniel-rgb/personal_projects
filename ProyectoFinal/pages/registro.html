<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeHabitos - Registro</title>
    <script src="../scripts/funciones.js" defer></script>
    <script src="../scripts/registro.js" defer></script>
    <link rel="stylesheet" href="../styles.css" />
</head>
<body>
    <header>
    </header>
    <main>
        <section id="registro">
            <div class="pagina_inicio_sesion_registro">
                <div class="titulo">
                    <h1>PokeHabitos</h1>
                    <p>¡Tu compañero para formar hábitos saludables con un toque Pokémon!</p>
                </div>
                <div>
                    <h2>Nuevo Registro de Usuario</h2>
                    <form id="formulario_registro" class="formulario_registro" novalidate>
                        <div class="campo">
                            <label for="nombre_usuario">Nuevo Usuario:</label>
                            <input type="text" id="nombre_usuario" name="nombre_usuario" required>
                            <p class="error" id="error_usuario"></p>
                        </div>
                        <div class="campo">
                            <label for="contrasena">Nueva Contraseña:</label>
                            <input type="password" id="contrasena" name="contrasena" required>
                            <p class="error" id="error_contrasena"></p>
                        </div>
                        <div class="campo">
                            <label for="contrasena_repetida">Reingrese la Contraseña:</label>
                            <input type="password" id="contrasena_repetida" name="contrasena_repetida" required>
                            <p class="error" id="error_contrasena_repetida"></p>
                        </div>
                        <div class="campo">
                            <label for="email">Correo Electrónico:</label>
                            <input type="email" id="email" name="email" required>
                            <p class="error" id="error_email"></p>
                        </div>
                        <div class="campo">
                            <label for="primer_pokemon">Selecciona tu Primer Pokemon</label>
                            <select id="primer_pokemon"></select>
                        </div>
                        <div class="campo_img_pokemon">
                            <img id="img_primer_pokemon_elegido" />
                        </div>
                        <div class="boton_campo">
                            <button type="submit">Registrarse</button>
                        </div>
                    </form>                    
                </div>   
            </div>
        </section>
    </main>
        <footer>
        <div class="pagina_registro espaciado_footer"> 
            <p>&copy; 2026 PokeHabitos. Creado por Daniel Mendez Zeledon.</p>
        </div>
    </footer>
    
</body>
</html>
