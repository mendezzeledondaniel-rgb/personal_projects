<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeHabitos - Pagina Principal</title>
    <script src="../scripts/datos.js" defer></script>
    <script src="../scripts/funciones.js" defer></script>
    <script src="../scripts/mispokemon.js" defer></script>
    <link rel="stylesheet" href="../styles.css" />
</head>
<body>
    <header>
        <div class="header_principal">
            <!--Title-->
            <div>
                <a class="titulo_principal" href="#mispokemon">PokeHabitos</a>
            </div>
            <!--List and elements-->
            <div id="header_bar" class="header_bar">
                <ul class="nav_bar_style">
                    <li>
                        <a href="./principal.html" class="active_page">Home</a>
                    </li>
                    <li>
                        <a href="./perfil.html">Mi Perfil</a>
                    </li>
                    <li>
                        <a href="./logros.html">Rachas y Logros</a>
                    </li>
                    <li>
                        <a href="#mispokemon">Mis Pokemon</a>
                    </li>
                    <li>
                        <a href="../index.html" id="cerrar_sesion">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main>
        <section id="mis_pokemon_section">
            <div class="mis_pokemon_container">
                <div class="titulo_agregar_pokemon">
                    <h2>Agrega tus Pokémon</h2>
                    <div id="explicacion_general"></div>
                    <div id="nivel_actual"></div>
                    <div id="maximo_actual"></div>
                </div>
                <div class="agregar_pokemon_top">
                    <button id="agregar_pokemon_btn">Agregar Nuevo Pokémon</button>
                </div>
                <div id="lista_pokemon_container" class="lista_pokemon_container">
                </div>
            </div>
        </section>

        <div id="agregar_pokemon_modal" class="modal" style="display: none;">
            <div class="modal_content">
                <span class="close">&times;</span>
                <h2>Seleccionar Nuevo Pokémon</h2>
                <select id="pokemon_select">
                    <option value="">Cargando Pokémon...</option>
                </select>
                <button id="confirmar_agregar_pokemon">Agregar Pokémon</button>
            </div>
        </div>
    </main>
    <footer>
        <div class="pagina_principal espaciado_footer">

        </div>
