<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeHabitos - Inicio de Sesión</title>
    <script src="./scripts/datos.js" defer></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <header>
    </header>
    <main>
        <section id="inicio_sesion">
            <div class="pagina_inicio_sesion_registro">
                <div class="titulo">
                    <h1>PokeHabitos</h1>
                    <p>¡Tu compañero para formar hábitos saludables con un toque Pokémon!</p>
                </div>
                <div>
                    <h2>Inicio de Sesion</h2>
                    <form id="formulario_inicio_sesion" class="formulario_inicio_sesion" novalidate>
                        <div class="campo">
                            <label for="nombre_usuario">Usuario:</label>
                            <input type="text" id="nombre_usuario" name="nombre_usuario" required>
                            <p class="error" id="error_usuario"></p>
                        </div>
                        <div class="campo">
                            <label for="contrasena_usuario">Contraseña:</label>
                            <input type="password" id="contrasena_usuario" name="contrasena" required>
                            <p class="error" id="error_contrasena"></p>
                        </div>
                        <div class="boton_campo">
                            <button type="submit">Iniciar Sesión</button>
                        </div>
                        <div class="campo">
                            <label for="nuevo_usuario">¿No tienes una cuenta?</label>
                            <button type="button" id="boton_registrarse">Registrarse</button>
                        </div>
                    </form>                    
                </div>   
            </div>
        </section>

    </main>
    <footer>
        <div class="pagina_inicio espaciado_footer"> 
            <p>&copy; 2026 PokeHabitos. Creado por Daniel Mendez Zeledon.</p>
        </div>
    </footer>
</body>
</html>
